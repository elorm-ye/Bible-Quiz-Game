<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bible Quiz Game - Ultimate Edition</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <audio id="bgm" loop></audio>

  <div id="app">
    <!-- Header -->
    <header id="top-bar" class="hidden">
      <!-- UI for Single Player Mode -->
      <div class="stats-container">
        <button id="btn-tts" class="icon-toggle" title="Read Question Aloud">🔊</button>
        <div class="stat streak-stat">
          <span class="icon" title="Daily Streak / Hot Streak">🔥</span>
          <span id="streak-counter">0</span>
        </div>
        <div class="progress-container">
          <div class="progress-bar-bg">
            <div id="progress-bar-fill"></div>
            <div class="progress-highlight"></div>
          </div>
        </div>
        <div class="stat score-stat">
          <span class="icon">💎</span>
          <span id="score-counter">0</span>
        </div>
        <div class="timer-stat">
          <span class="icon">⏱️</span> <span id="timer-display">15</span>
        </div>
      </div>

      <!-- UI for Multi Player Mode (Mini Scoreboard) -->
      <div id="mini-scoreboard" class="hidden">
        <div class="mini-score-header">
           <div id="turn-announcer" class="hidden">Player 1's Turn!</div>
           <div class="timer-stat"><span class="icon">⏱️</span> <span id="multi-timer">15</span></div>
           <button id="btn-tts-multi" class="icon-toggle" style="display:none;">🔊</button> 
        </div>
        <div class="mini-table">
          <div class="m-row header"><span>Player</span><span>Score</span><span>Wrong</span></div>
          <div class="m-row" id="p1-row"><span id="p1-mininame">P1</span><span id="p1-miniscore">0</span><span id="p1-miniwrong">0</span></div>
          <div class="m-row" id="p2-row"><span id="p2-mininame">P2</span><span id="p2-miniscore">0</span><span id="p2-miniwrong">0</span></div>
        </div>
      </div>
      
      <!-- Shared Lifelines -->
      <div class="lifelines-container" id="lifelines-container">
        <button class="lifeline-btn" id="life-5050" title="50/50 Chance">🌗 50/50</button>
        <button class="lifeline-btn" id="life-skip" title="Skip Question">⏭️ Skip</button>
        <button class="lifeline-btn" id="life-hint" title="Reveal a Hint">💡 Hint</button>
      </div>
    </header>

    <!-- Welcome Screen -->
    <div id="welcome-screen" class="screen slide-up">
      <div class="welcome-center">
        <div class="title-container">
          <h1>Bible Quiz Game</h1>
          <p>Test your knowledge or challenge a friend to a Turn-Based Duel!</p>
        </div>
        
        <div class="character-greeting">
          <div class="avatar jump">🧔🏽‍♂️</div>
          <div class="speech-bubble">Welcome! Are you playing solo or verse mode?</div>
        </div>
        
        <div class="options-panel">
          <label>Game Mode: </label>
          <select id="mode-select" class="dropdown-fancy">
            <option value="single">Single Player</option>
            <option value="multi">2-Player Versus</option>
          </select>
          
          <div id="multiplayer-inputs" style="display:none; margin-top:15px; flex-direction:column; gap:10px;">
             <input type="text" id="p1-name" placeholder="Player 1 Name" class="fancy-input" maxlength="15">
             <input type="text" id="p2-name" placeholder="Player 2 Name" class="fancy-input" maxlength="15">
          </div>

          <div style="margin-top:15px;">
            <label>Difficulty: </label>
            <select id="difficulty-select" class="dropdown-fancy">
              <option value="Any">All Difficulties</option>
              <option value="easy">Easy</option>
              <option value="medium">Medium</option>
              <option value="hard">Hard</option>
            </select>
          </div>
        </div>

        <div class="vertical-buttons">
          <button id="btn-start" class="btn btn-primary btn-large wobble-hover">START QUIZ</button>
          <button id="btn-leaderboard" class="btn btn-secondary btn-large">🏆 LEADERBOARDS</button>
        </div>
      </div>
    </div>

    <!-- Category Screen (auto mix if they don't want to choose) -->
    <div id="category-screen" class="screen hidden">
      <h2>Choose a Category</h2>
      <div class="category-grid" id="category-grid"></div>
    </div>

    <!-- Leaderboards -->
    <div id="leaderboard-screen" class="screen hidden">
      <h2>Hall of Faith (Leaderboards)</h2>
      <div class="leaderboard-container">
        <div class="leaderboard-row header-row">
          <span>Rank</span><span>Score</span><span>Date</span>
        </div>
        <div id="leaderboard-list"></div>
      </div>
      <button id="btn-leaderboard-back" class="btn btn-secondary btn-large" style="margin-top:20px;">BACK</button>
    </div>

    <!-- Question Screen -->
    <div id="question-screen" class="screen hidden">
      <div class="main-quiz-area">
        <div id="hint-display" class="hidden"></div>
        <div class="character-area">
          <div id="question-avatar" class="avatar bounce-in">🧔🏽‍♂️</div>
          <div id="question-speech" class="speech-bubble">Loading...</div>
        </div>

        <div id="dynamic-answer-area">
          <div class="options-grid" id="options-grid"></div>
        </div>
      </div>

      <footer id="feedback-footer" class="hidden">
        <div class="feedback-content">
          <div id="feedback-message" class="feedback-text">
            <h2>...</h2>
            <p id="feedback-subtext" class="reference-text"></p>
          </div>
          <button id="btn-next" class="btn btn-primary">CONTINUE</button>
        </div>
      </footer>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="screen hidden">
      <div class="result-center">
        <h1 id="result-title">Quiz Complete!</h1>
        <div class="badges-container" id="badges-container"></div>
        <div class="score-summary"></div>
        <p id="encouragement-message" style="margin-top:15px; font-weight:700; font-size:1.3rem;"></p>
        <div class="action-buttons" style="margin-top:20px;">
          <button id="btn-restart" class="btn btn-primary btn-large">PLAY AGAIN</button>
          <button id="btn-home" class="btn btn-secondary btn-large">HOME</button>
        </div>
      </div>
    </div>

  </div>

  <button id="scroll-top-btn" class="hidden" title="Scroll to Top">⬆️</button>

  <script src="renderer.js"></script>
</body>
</html>
